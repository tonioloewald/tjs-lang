<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#006736"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc1118"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Untrusted Code box -->
  <g filter="url(#shadow)">
    <rect x="210" y="16" width="180" height="40" rx="8" fill="#fff3f3" stroke="#ff1c24" stroke-width="1.5"/>
  </g>
  <text x="300" y="41" text-anchor="middle" fill="#cc1118" font-size="14" font-weight="600">Untrusted Code</text>

  <!-- Central line down -->
  <line x1="300" y1="56" x2="300" y2="86" stroke="#999" stroke-width="1.5"/>

  <!-- Branching lines to 4 capabilities -->
  <line x1="300" y1="86" x2="80" y2="120" stroke="#999" stroke-width="1.2"/>
  <line x1="300" y1="86" x2="230" y2="120" stroke="#999" stroke-width="1.2"/>
  <line x1="300" y1="86" x2="370" y2="120" stroke="#999" stroke-width="1.2"/>
  <line x1="300" y1="86" x2="520" y2="120" stroke="#999" stroke-width="1.2"/>

  <!-- fetch() -->
  <rect x="30" y="120" width="100" height="32" rx="6" fill="#f8f8f8" stroke="#999" stroke-width="1"/>
  <text x="80" y="140" text-anchor="middle" fill="#444" font-size="12" font-family="monospace">fetch()</text>

  <!-- fs.read() -->
  <rect x="180" y="120" width="100" height="32" rx="6" fill="#f8f8f8" stroke="#999" stroke-width="1"/>
  <text x="230" y="140" text-anchor="middle" fill="#444" font-size="12" font-family="monospace">fs.read()</text>

  <!-- loop -->
  <rect x="320" y="120" width="100" height="32" rx="6" fill="#f8f8f8" stroke="#999" stroke-width="1"/>
  <text x="370" y="140" text-anchor="middle" fill="#444" font-size="12" font-family="monospace">loop</text>

  <!-- console -->
  <rect x="470" y="120" width="100" height="32" rx="6" fill="#f8f8f8" stroke="#999" stroke-width="1"/>
  <text x="520" y="140" text-anchor="middle" fill="#444" font-size="12" font-family="monospace">console</text>

  <!-- Arrows down from capabilities -->
  <line x1="80" y1="152" x2="80" y2="182" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="230" y1="152" x2="230" y2="182" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="370" y1="152" x2="370" y2="182" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="520" y1="152" x2="520" y2="182" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Gate diamonds -->
  <!-- fetch gate: Granted? -->
  <polygon points="80,186 120,206 80,226 40,206" fill="#fffbe6" stroke="#b8860b" stroke-width="1.2"/>
  <text x="80" y="210" text-anchor="middle" fill="#8b6914" font-size="10" font-weight="500">Granted?</text>

  <!-- fs gate: Granted? -->
  <polygon points="230,186 270,206 230,226 190,206" fill="#fffbe6" stroke="#b8860b" stroke-width="1.2"/>
  <text x="230" y="210" text-anchor="middle" fill="#8b6914" font-size="10" font-weight="500">Granted?</text>

  <!-- loop gate: Fuel left? -->
  <polygon points="370,186 414,206 370,226 326,206" fill="#fffbe6" stroke="#b8860b" stroke-width="1.2"/>
  <text x="370" y="210" text-anchor="middle" fill="#8b6914" font-size="10" font-weight="500">Fuel left?</text>

  <!-- console gate: Granted? -->
  <polygon points="520,186 560,206 520,226 480,206" fill="#fffbe6" stroke="#b8860b" stroke-width="1.2"/>
  <text x="520" y="210" text-anchor="middle" fill="#8b6914" font-size="10" font-weight="500">Granted?</text>

  <!-- fetch: YES path -->
  <line x1="55" y1="216" x2="20" y2="250" stroke="#006736" stroke-width="1.2"/>
  <text x="28" y="238" fill="#006736" font-size="9" font-weight="600">Y</text>

  <!-- fetch: Your safeFetch -->
  <g filter="url(#shadow)">
    <rect x="0" y="254" width="110" height="44" rx="6" fill="#f0fff5" stroke="#006736" stroke-width="1.5"/>
  </g>
  <text x="55" y="272" text-anchor="middle" fill="#005028" font-size="11" font-weight="500">Your</text>
  <text x="55" y="286" text-anchor="middle" fill="#005028" font-size="11" font-family="monospace" font-weight="500">safeFetch</text>

  <!-- fetch: NO path -->
  <line x1="105" y1="216" x2="135" y2="250" stroke="#cc1118" stroke-width="1.2"/>
  <text x="127" y="238" fill="#cc1118" font-size="9" font-weight="600">N</text>

  <!-- Block boxes -->
  <rect x="115" y="254" width="70" height="28" rx="6" fill="#fff3f3" stroke="#cc1118" stroke-width="1.5"/>
  <text x="150" y="273" text-anchor="middle" fill="#cc1118" font-size="12" font-weight="600">Block</text>

  <!-- fs.read: NO only -->
  <line x1="230" y1="226" x2="230" y2="250" stroke="#cc1118" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="240" y="242" fill="#cc1118" font-size="9" font-weight="600">N</text>
  <rect x="195" y="254" width="70" height="28" rx="6" fill="#fff3f3" stroke="#cc1118" stroke-width="1.5"/>
  <text x="230" y="273" text-anchor="middle" fill="#cc1118" font-size="12" font-weight="600">Block</text>

  <!-- loop: YES path -->
  <line x1="345" y1="216" x2="315" y2="250" stroke="#006736" stroke-width="1.2"/>
  <text x="322" y="238" fill="#006736" font-size="9" font-weight="600">Y</text>
  <rect x="285" y="254" width="80" height="28" rx="6" fill="#f0fff5" stroke="#006736" stroke-width="1.5"/>
  <text x="325" y="273" text-anchor="middle" fill="#005028" font-size="12" font-weight="500">Continue</text>

  <!-- loop: NO path -->
  <line x1="395" y1="216" x2="420" y2="250" stroke="#cc1118" stroke-width="1.2"/>
  <text x="415" y="238" fill="#cc1118" font-size="9" font-weight="600">N</text>
  <rect x="400" y="254" width="60" height="28" rx="6" fill="#fff3f3" stroke="#cc1118" stroke-width="1.5"/>
  <text x="430" y="273" text-anchor="middle" fill="#cc1118" font-size="12" font-weight="600">Halt</text>

  <!-- console: NO only -->
  <line x1="520" y1="226" x2="520" y2="250" stroke="#cc1118" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="530" y="242" fill="#cc1118" font-size="9" font-weight="600">N</text>
  <rect x="485" y="254" width="70" height="28" rx="6" fill="#fff3f3" stroke="#cc1118" stroke-width="1.5"/>
  <text x="520" y="273" text-anchor="middle" fill="#cc1118" font-size="12" font-weight="600">Block</text>

  <!-- Legend -->
  <rect x="130" y="320" width="340" height="80" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="300" y="342" text-anchor="middle" fill="#666" font-size="11" font-weight="600">Capability-Based Security</text>

  <circle cx="165" cy="362" r="6" fill="#f0fff5" stroke="#006736" stroke-width="1.2"/>
  <text x="180" y="366" fill="#444" font-size="11">Granted = your wrapper runs</text>

  <circle cx="165" cy="384" r="6" fill="#fff3f3" stroke="#cc1118" stroke-width="1.2"/>
  <text x="180" y="388" fill="#444" font-size="11">Not granted = silently blocked</text>
</svg>